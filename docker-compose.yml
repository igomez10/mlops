# Dev: host-run `make dev-server` uses localhost ports (see Makefile DEV_*_PORT).
# In-container services use service DNS names: mlflow:5000, mongodb:27017.

services:
  mongodb:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${DEV_MONGO_PORT:-27017}:27017"
    volumes:
      - mongo_data:/data/db

  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    restart: unless-stopped
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "${DEV_MLFLOW_PORT:-5001}:5000"

  fastapi:
    image: us-central1-docker.pkg.dev/mlops-492103/fastapi/fastapi:latest
    depends_on:
      - mlflow
      - mongodb
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_URI: ${MLFLOW_MODEL_URI:-}
      MONGODB_URI: mongodb://mongodb:27017
    ports:
      - "8000:8000"

volumes:
  mlflow_data:
  mongo_data:
