services:
  mlflow:
    image: ghcr.io/mlflow/mlflow:v3.10.1-full
    command: >
      mlflow server
        --host 0.0.0.0
        --port 5000
        --default-artifact-root /mlflow/artifacts
        --serve-artifacts
    volumes:
      - mlflow_data:/mlflow
    ports:
      - "5001:5000"

  fastapi:
    image: us-central1-docker.pkg.dev/mlops-492103/fastapi/fastapi:latest
    depends_on:
      - mlflow
    environment:
      MLFLOW_TRACKING_URI: http://mlflow:5000
      MLFLOW_MODEL_URI: ${MLFLOW_MODEL_URI}
    ports:
      - "8000:8000"

volumes:
  mlflow_data:
