# Build Dockerfile.fastapi (Vite + FastAPI) → Artifact Registry `fastapi/fastapi` → deploy Cloud Run `fastapi`.
# Same image serves the API and the static UI (no separate UI service).
#
# gcloud builds submit --config=cloudbuild.yaml --project=PROJECT_ID
# Trigger: set github_build_* in Terraform (github_build_trigger.tf); connect GitHub in Cloud Build first.
#
# IAM: see terraform cloudbuild_iam.tf (Cloud Build service account on the project).
#
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
  automapSubstitutions: true

substitutions:
  _REGION: us-central1

steps:
  - id: auth-docker
    name: gcr.io/google.com/cloudsdks/gcloud:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud auth configure-docker "${_REGION}-docker.pkg.dev" --quiet

  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/fastapi/fastapi"
        if [ -n "$$COMMIT_SHA" ]; then
          docker build -f Dockerfile.fastapi -t "$${IMAGE}:$$COMMIT_SHA" -t "$${IMAGE}:latest" .
          docker push "$${IMAGE}:$$COMMIT_SHA"
          docker push "$${IMAGE}:latest"
          echo -n "$$COMMIT_SHA" > /workspace/image_tag.txt
        else
          docker build -f Dockerfile.fastapi -t "$${IMAGE}:latest" .
          docker push "$${IMAGE}:latest"
          echo -n "latest" > /workspace/image_tag.txt
        fi
    waitFor:
      - auth-docker

  - id: deploy-fastapi
    name: gcr.io/google.com/cloudsdks/gcloud:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/fastapi/fastapi"
        TAG=$$(cat /workspace/image_tag.txt)
        gcloud run deploy fastapi \
          --image="$${IMAGE_BASE}:$${TAG}" \
          --region="${_REGION}" \
          --project="${PROJECT_ID}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8000 \
          --min-instances=0 \
          --max-instances=2
    waitFor:
      - build-and-push
