# Cloud Build: build the React (Vite) UI, push to Artifact Registry (ui/ui), deploy Cloud Run "ui".
#
# Bakes VITE_API_BASE_URL from the public "fastapi" service URL in the same project/region.
#
# Prerequisites: "fastapi" Cloud Run; Artifact Registry "ui" repo (terraform). IAM on ui.tf for Cloud Build SA.
#
# Manual:  gcloud builds submit --config=cloudbuild.yaml --project=PROJECT_ID
# From Git: enable Terraform trigger (github_ui_trigger.tf) after connecting the repo in Cloud Build.
#
timeout: 1200s
options:
  logging: CLOUD_LOGGING_ONLY
  automapSubstitutions: true
  # Use E2_HIGHCPU_8 to speed up npm ci inside the Docker build if needed (adds build cost)

substitutions:
  _REGION: us-central1

steps:
  - id: resolve-fastapi-url
    name: gcr.io/google.com/cloudsdks/gcloud:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud run services describe fastapi \
          --region="${_REGION}" \
          --project="${PROJECT_ID}" \
          --format='value(status.url)' | tr -d '\n' > /workspace/fastapi_base_url.txt
        test -s /workspace/fastapi_base_url.txt
        echo "VITE_API_BASE_URL=$$(cat /workspace/fastapi_base_url.txt)"

  - id: auth-docker
    name: gcr.io/google.com/cloudsdks/gcloud:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        gcloud auth configure-docker "${_REGION}-docker.pkg.dev" --quiet
    waitFor:
      - resolve-fastapi-url

  - id: build-and-push
    name: gcr.io/cloud-builders/docker
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        VITE=$$(cat /workspace/fastapi_base_url.txt)
        IMAGE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/ui/ui"
        # GitHub trigger sets $$COMMIT_SHA; gcloud builds submit does not
        if [ -n "$$COMMIT_SHA" ]; then
          docker build -f frontend/Dockerfile \
            --build-arg "VITE_API_BASE_URL=$$VITE" \
            -t "$${IMAGE}:$$COMMIT_SHA" \
            -t "$${IMAGE}:latest" \
            frontend
          docker push "$${IMAGE}:$$COMMIT_SHA"
          docker push "$${IMAGE}:latest"
          echo -n "$$COMMIT_SHA" > /workspace/ui_image_tag.txt
        else
          docker build -f frontend/Dockerfile \
            --build-arg "VITE_API_BASE_URL=$$VITE" \
            -t "$${IMAGE}:latest" \
            frontend
          docker push "$${IMAGE}:latest"
          echo -n "latest" > /workspace/ui_image_tag.txt
        fi
    waitFor:
      - auth-docker

  - id: deploy-ui
    name: gcr.io/google.com/cloudsdks/gcloud:slim
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        IMAGE_BASE="${_REGION}-docker.pkg.dev/${PROJECT_ID}/ui/ui"
        TAG=$$(cat /workspace/ui_image_tag.txt)
        gcloud run deploy ui \
          --image="$${IMAGE_BASE}:$${TAG}" \
          --region="${_REGION}" \
          --project="${PROJECT_ID}" \
          --platform=managed \
          --allow-unauthenticated \
          --port=8080 \
          --min-instances=0 \
          --max-instances=2
    waitFor:
      - build-and-push
